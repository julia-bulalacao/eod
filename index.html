<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOD Report Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --bg2: #ffffff;
      --bg3: #eeecea;
      --border: #e0ddd8;
      --border2: #ccc9c3;
      --text: #1a1917;
      --text2: #706e69;
      --text3: #b0ada8;
      --accent: #008000;
      --accent-dim: #006600;
      --accent-bg: #e6f4e6;
      --danger: #cc3333;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --bg2: #181818;
      --bg3: #222;
      --border: #2e2e2e;
      --border2: #3a3a3a;
      --text: #f0ede8;
      --text2: #888;
      --text3: #555;
      --accent: #4ade80;
      --accent-dim: #3abf6a;
      --accent-bg: #0d2b1a;
      --danger: #ff5f5f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-block h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-block h1 span {
      color: var(--accent);
    }

    .logo-block p {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      color: var(--text2);
      align-self: flex-start;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
    }

    textarea, input[type="text"], input[type="date"] {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: var(--border2);
    }

    textarea {
      height: 380px;
      resize: none;
      line-height: 1.6;
    }

    input[type="text"], input[type="date"] {
      height: 38px;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .section-map {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      height: 330px;
      overflow: hidden;
    }

    .section-map-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .srow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .srow-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      min-width: 130px;
      white-space: nowrap;
    }


    .srow input[type="text"] {
      font-size: 11px;
      height: 30px;
      padding: 5px 8px;
      flex: 1;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { background: var(--bg3); }
    button:active { transform: scale(0.98); }

    button.primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      font-weight: 600;
    }

    button.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

    .output-section { margin-top: 1.5rem; }

    .output-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .count-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid #2e4010;
    }

    .copied-msg {
      font-size: 12px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      font-family: var(--mono);
    }

    .copied-msg.show { opacity: 1; }

    .output-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      min-height: 160px;
      overflow-y: auto;
    }

    .empty-state {
      color: var(--text3);
      font-style: italic;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Syntax highlight in output */
    .out-header { color: var(--text2); }
    .out-project { color: var(--accent); font-weight: 500; }
    .out-section { color: #7dd3fc; }
    .out-item { color: var(--text); }
    .out-num { color: var(--accent); }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text3);
      font-family: var(--mono);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo-block">
        <h1>EOD <span>Report</span> Generator</h1>
        <p>Paste your Redmine activity → get formatted EOD instantly</p>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="tag">v1.0.0</span>
        <button onclick="toggleTheme()" id="themeBtn" style="font-size:13px; padding:5px 12px; border-radius:999px;">🌙 Dark</button>
      </div>
    </header>

    <div class="grid">
      <div class="field">
        <label>Redmine Activity — paste raw text</label>
        <textarea id="input" placeholder="I-paste dito ang copied text ng Redmine activity page mo...

Example:
09:09 PM Qc Smart Connect (Online)_v1.0.0.a Feedback #99629 (Deploy Request): OMMS module stuck in loading
Bulalacao, Julia Margarette A.
..."></textarea>
      </div>

      <div class="right-col">
        <div class="field">
            <label>Date</label>
            <input type="date" id="reportDate" />
          </div>

        <div class="section-map">
          <div class="section-map-title">Section label mapping</div>
          <div id="sectionRows"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="generate()">Generate EOD</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <hr class="divider" />

    <div class="output-section">
      <div class="output-header">
        <label style="text-transform:uppercase; letter-spacing:0.08em;">Output</label>
        <span class="count-badge" id="countBadge">0 items</span>
        <span class="copied-msg" id="copiedMsg">✓ Copied!</span>
      </div>
      <div class="output-box" id="output"><span class="empty-state">Output will appear here...</span></div>
      <div class="actions" style="margin-top: 10px;">
        <button onclick="copyOutput()">Copy to clipboard</button>
      </div>
    </div>

    <footer>built for julia · redmine eod generator</footer>

  </div>

  <script>
    const SECTIONS = [
      { keyword: "final qa",        label: "*FINAL QA*" },
      { keyword: "feedback to dev", label: "*FEEDBACK TO DEV*" },
      { keyword: "deploy request",  label: "*DEPLOY REQUEST*" },
      { keyword: "on going qa",     label: "*ON GOING QA*" },
      { keyword: "filed feedback",  label: "*FILED FEEDBACK*" },
      { keyword: "on queue for qa", label: "*ON QUEUE FOR QA*" },
      { keyword: "closed",           label: "*CLOSED*" },
    ];

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeBtn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Apply saved theme on load
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      window.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
      });
    })();

    function initDate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      document.getElementById('reportDate').value = `${y}-${m}-${day}`;
    }

    function buildSectionRows() {
      const container = document.getElementById('sectionRows');
      SECTIONS.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'srow';
        row.innerHTML = `<span class="srow-key">${s.keyword}</span><input type="text" id="label_${i}" value="${s.label}" />`;
        container.appendChild(row);
      });
    }

    function getLabels() {
      const base = SECTIONS.map((s, i) => ({
        keyword: s.keyword.toLowerCase(),
        label: document.getElementById(`label_${i}`).value || `*${s.keyword.toUpperCase()}*`
      }));

      return base;
    }

    function extractProjectName(line) {
      // Primary: Feature/Feedback/Bug tracker (most common, safe — won't conflict with project names)
      let m = line.match(/^\d{1,2}:\d{2}\s*(?:AM|PM)\s+(.+?)\s+(?:\d+\.\d+\s+hour\s+\()?(?:Feature|Feedback|Bug)\s+#/i);
      // Fallback: other tracker types requiring at least 2 words before them
      if (!m) m = line.match(/^\d{1,2}:\d{2}\s*(?:AM|PM)\s+(\w[\w\s&]+?)\s+(?:Documentation|Support|Research\s*&\s*Dev|QA|Task)\s+#/i);
      if (!m) return null;
      return m[1]
        .replace(/\s*\((?:Online|Offline|Staging)[^)]*\)[_\w.]*$/i, '')
        .replace(/\s+(?:Documentation|Support|Research\s*&\s*Dev|QA|Bug|Feature|Feedback|Task)$/i, '')
        .replace(/_[A-Za-z]+$/, '')
        .replace(/\s+Web$/i, '')
        .trim();
    }

    function isActivityLine(line) {
      // Valid activity lines start with a timestamp: "HH:MM AM/PM"
      return /^\d{1,2}:\d{2}\s*(?:AM|PM)\s+/i.test(line);
    }

    function parseActivity(raw) {
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const items = [];
      const seen = new Set();
      // Match issue lines — also handles "0.50 hour (Feedback #XXXX (Status): Title)"
      const issueRe = /(Feature|Feedback|Bug|Documentation|Support|Research\s*&\s*Dev|Task|QA)\s+#(\d+)(?:\s*\(([^)]+)\))?:\s*([^)]+)\)?/i;

      for (const line of lines) {
        // Only process lines that start with a timestamp — skip QA notes, names, clipboard refs etc.
        if (!isActivityLine(line)) continue;

        const m = line.match(issueRe);
        if (!m) continue;
        const type = m[1];
        const num = m[2];
        const statusRaw = (m[3] || '').trim();
        // Clean trailing ) that may come from "0.50 hour (...)" wrapping
        const title = m[4].replace(/\)$/, '').trim();
        const key = `${type.toLowerCase()}#${num}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const project = extractProjectName(line) || '__unknown__';
        items.push({ type, num, statusRaw, title, project });
      }
      return items;
    }

    // Maps exact Redmine status tags → EOD section labels
    const STATUS_MAP = {
      'final qa':      '*FINAL QA*',
      'deploy request':'*DEPLOY REQUEST*',
      'new':           '*FILED FEEDBACK*',
      'qa process':    '*ON GOING QA*',
      'feedback':      '*FEEDBACK TO DEV*',
      'on queue':      '*ON QUEUE FOR QA*',
      'closed':        '*CLOSED*',
    };

    function classifyStatus(statusRaw, labels) {
      const s = statusRaw.toLowerCase().trim();

      for (const [tag, section] of Object.entries(STATUS_MAP)) {
        if (s === tag || s.includes(tag)) {
          const match = labels.find(l => l.label === section);
          return match ? match.label : section;
        }
      }

      for (const l of labels) {
        if (s.includes(l.keyword)) return l.label;
      }

      return labels[0].label;
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return `${months[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;
    }

    function generate() {
      const raw = document.getElementById('input').value;
      const dateVal = document.getElementById('reportDate').value;
      const labels = getLabels();
      const outputEl = document.getElementById('output');

      if (!raw.trim()) {
        outputEl.innerHTML = '<span class="empty-state">Walang input. I-paste muna ang Redmine activity text.</span>';
        return;
      }

      const allItems = parseActivity(raw);

      if (!allItems.length) {
        outputEl.innerHTML = '<span class="empty-state">Walang nahanap. Check mo kung tama ang na-copy na text — dapat may "Feature #XXXXX" o "Feedback #XXXXX" sa loob.</span>';
        return;
      }

      // Group items by project, preserving first-seen order
      const projectOrder = [];
      const byProject = {};
      for (const item of allItems) {
        const p = item.project;
        if (!byProject[p]) {
          byProject[p] = {};
          projectOrder.push(p);
          for (const l of labels) byProject[p][l.label] = [];
        }
        const sec = classifyStatus(item.statusRaw, labels);
        if (!byProject[p][sec]) byProject[p][sec] = [];
        byProject[p][sec].push(item);
      }

      const sectionOrder = labels.map(l => l.label);
      const dateStr = dateVal ? formatDate(dateVal) : formatDate(new Date().toISOString().split('T')[0]);

      let total = 0;
      const blocks = [];

      for (const project of projectOrder) {
        const displayProject = project === '__unknown__' ? '(Unknown Project)' : project;
        let block = `QA Updates\nAs of ${dateStr}\n${displayProject}\n\n`;

        for (const sec of sectionOrder) {
          const secItems = byProject[project][sec] || [];
          if (secItems.length) {
            block += `${sec}\n`;
            for (const item of secItems) {
              block += `- ${item.type} #${item.num}: ${item.title}\n`;
              total++;
            }
            block += `\n`;
          }
        }
        blocks.push(block.trim());
      }

      const out = blocks.join('\n\n');

      outputEl.textContent = out.trim();
      document.getElementById('countBadge').textContent = `${total} item${total !== 1 ? 's' : ''}`;
    }

    function copyOutput() {
      const text = document.getElementById('output').textContent;
      if (!text || text.includes('Output will appear') || text.includes('Walang')) return;

      const showCopied = () => {
        const el = document.getElementById('copiedMsg');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text, showCopied));
      } else {
        fallbackCopy(text, showCopied);
      }
    }

    function fallbackCopy(text, callback) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); callback(); } catch(e) {}
      document.body.removeChild(ta);
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').innerHTML = '<span class="empty-state">Output will appear here...</span>';
      document.getElementById('countBadge').textContent = '0 items';
    }

    initDate();
    buildSectionRows();
  </script>
</body>
</html>
