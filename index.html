<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOD Formatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --bg2: #ffffff;
      --bg3: #eeecea;
      --border: #e0ddd8;
      --border2: #ccc9c3;
      --text: #1a1917;
      --text2: #706e69;
      --text3: #b0ada8;
      --accent: #008000;
      --accent-dim: #006600;
      --accent-bg: #e6f4e6;
      --danger: #cc3333;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --bg2: #181818;
      --bg3: #222;
      --border: #2e2e2e;
      --border2: #3a3a3a;
      --text: #f0ede8;
      --text2: #888;
      --text3: #555;
      --accent: #4ade80;
      --accent-dim: #3abf6a;
      --accent-bg: #0d2b1a;
      --danger: #ff5f5f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-block h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-block h1 span {
      color: var(--accent);
    }

    .logo-block p {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      color: var(--text2);
      align-self: flex-start;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
    }

    textarea, input[type="text"], input[type="date"] {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: var(--border2);
    }

    textarea {
      height: 380px;
      resize: none;
      line-height: 1.6;
    }

    input[type="text"], input[type="date"] {
      height: 38px;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .section-map {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      height: 330px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3);
    }

    .section-map-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .srow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .srow-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      min-width: 130px;
      white-space: nowrap;
    }


    .srow input[type="text"] {
      font-size: 11px;
      height: 30px;
      padding: 5px 8px;
      flex: 1;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { background: var(--bg3); }
    button:active { transform: scale(0.98); }

    button.primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      font-weight: 600;
    }

    button.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

    .output-section { margin-top: 1.5rem; }

    .output-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .count-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid #2e4010;
    }

    .copied-msg {
      font-size: 12px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      font-family: var(--mono);
    }

    .copied-msg.show { opacity: 1; }

    .output-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      min-height: 160px;
      overflow-y: auto;
    }

    .empty-state {
      color: var(--text3);
      font-style: italic;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Syntax highlight in output */
    .out-header { color: var(--text2); }
    .out-project { color: var(--accent); font-weight: 500; }
    .out-section { color: #7dd3fc; }
    .out-item { color: var(--text); }
    .out-num { color: var(--accent); }

    .project-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .project-block-toprow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .project-block-firstline {
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--text);
    }

    .project-block-copy {
      font-size: 12px;
      padding: 4px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .project-block-copy:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .project-block-content {
      padding: 10px 16px 16px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
    }

    .project-block-rest {
      white-space: pre-wrap;
    }

    .reminder {
      margin-top: 1rem;
      padding: 12px 16px;
      background: #fffbea;
      border: 1px solid #f0d080;
      border-radius: var(--radius);
      font-size: 13px;
      color: #7a5c00;
      font-family: var(--sans);
    }

    [data-theme="dark"] .reminder {
      background: #2a2200;
      border-color: #5a4400;
      color: #f0c040;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text3);
      font-family: var(--mono);
      text-align: center;
    }
    .datepicker-wrap {
      position: relative;
    }

    .datepicker-input {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 38px;
      padding: 0 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--text);
      transition: border-color 0.15s;
      user-select: none;
    }

    .datepicker-input:hover { border-color: var(--border2); }

    .datepicker-icon {
      color: var(--text3);
      font-size: 14px;
    }

    .datepicker-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .datepicker-dropdown.open { display: block; }

    .dp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .dp-month-year {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .dp-nav {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text2);
      cursor: pointer;
      padding: 2px 8px;
      border-radius: var(--radius);
      line-height: 1;
    }

    .dp-nav:hover { background: var(--bg3); color: var(--text); }

    .dp-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      margin-bottom: 6px;
    }

    .dp-weekdays span {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      padding: 2px 0;
      text-transform: uppercase;
    }

    .dp-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .dp-day {
      text-align: center;
      padding: 6px 2px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s;
    }

    .dp-day:hover { background: var(--bg3); }
    .dp-day.empty { cursor: default; }
    .dp-day.today { color: var(--accent); font-weight: 600; }
    .dp-day.selected { background: var(--accent); color: #fff; font-weight: 600; }
    .dp-day.selected:hover { background: var(--accent-dim); }

    .dp-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .dp-footer-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
    }

    .dp-footer-btn:hover { background: var(--bg3); color: var(--text); }

    .dp-today-btn {
      color: var(--accent);
      border-color: var(--accent);
      font-weight: 500;
    }

    .dp-today-btn:hover { background: var(--accent-bg); }

    .toast {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: #f0faf0;
      color: #1a5e1a;
      border: 1px solid #b6e0b6;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 999px;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0,100,0,0.1);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo-block">
        <h1>Para sa <span>lazy like me</span></h1>
        <p>Paste your Redmine activity → get formatted EOD instantly</p>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <button onclick="toggleTheme()" id="themeBtn" style="font-size:13px; padding:5px 12px; border-radius:999px;">🌙 Dark</button>
      </div>
    </header>

    <div class="grid">
      <div class="field">
        <label>Redmine Activity — paste raw text</label>
        <textarea id="input" placeholder="Go to Activity and copy the text beh"></textarea>
      </div>

      <div class="right-col">
        <div class="field">
            <label>Date</label>
            <div class="datepicker-wrap" id="datepickerWrap">
              <div class="datepicker-input" id="datepickerInput" onclick="togglePicker()">
                <span id="datepickerDisplay">Select date</span>
                <span class="datepicker-icon">▾</span>
              </div>
              <div class="datepicker-dropdown" id="datepickerDropdown">
                <div class="dp-header">
                  <button class="dp-nav" onclick="changeMonth(-1)">‹</button>
                  <span class="dp-month-year" id="dpMonthYear"></span>
                  <button class="dp-nav" onclick="changeMonth(1)">›</button>
                </div>
                <div class="dp-weekdays">
                  <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                </div>
                <div class="dp-days" id="dpDays"></div>
                <div class="dp-footer">
                  <button class="dp-footer-btn" onclick="clearDate()">Clear</button>
                  <button class="dp-footer-btn dp-today-btn" onclick="selectToday()">Today</button>
                </div>
              </div>
            </div>
            <input type="hidden" id="reportDate" />
          </div>

        <div class="section-map">
          <div class="section-map-title">Section label mapping</div>
          <div id="sectionRows"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="generate()">Generate EOD</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <hr class="divider" />

    <div class="output-section">
      <div class="output-header">
        <label style="text-transform:uppercase; letter-spacing:0.08em;">Output</label>
        <span class="count-badge" id="countBadge">0 items</span>
      </div>
      <div class="reminder" id="reminder" style="display:none; margin-bottom: 1rem;">
        ⚠️ Double-check if may na-miss na items before sending to the GC!
      </div>
      <div id="outputBlocks"><span class="empty-state" style="font-style:italic; color:var(--text3); font-size:13px;">Output will appear here...</span></div>
    </div>

    <footer>by yours truly · lia 💛</footer>

  </div>

  <script>
    const SECTIONS = [
      { keyword: "final qa",        label: "*FINAL QA*" },
      { keyword: "feedback to dev", label: "*FEEDBACK TO DEV*" },
      { keyword: "deploy request",  label: "*DEPLOY REQUEST*" },
      { keyword: "on going qa",     label: "*ON GOING QA*" },
      { keyword: "filed feedback",  label: "*FILED FEEDBACK*" },
      { keyword: "on queue for qa", label: "*ON QUEUE FOR QA*" },
      { keyword: "closed",           label: "*CLOSED*" },
      { keyword: "rejected",          label: "*REJECTED*" },
      { keyword: "on hold",           label: "*ON HOLD*" },
    ];

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeBtn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Apply saved theme on load
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      window.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
      });
    })();

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    let dpDate = new Date();
    let dpSelected = new Date();

    function initDate() {
      dpSelected = new Date();
      dpDate = new Date();
      setHiddenDate(dpSelected);
      updateDisplay(dpSelected);
      document.getElementById('datepickerDisplay').style.color = '';
      renderCalendar();
    }

    function setHiddenDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      document.getElementById('reportDate').value = `${y}-${m}-${day}`;
    }

    function updateDisplay(d) {
      document.getElementById('datepickerDisplay').textContent =
        `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    function togglePicker() {
      document.getElementById('datepickerDropdown').classList.toggle('open');
    }

    function changeMonth(dir) {
      dpDate.setMonth(dpDate.getMonth() + dir);
      renderCalendar();
    }

    function renderCalendar() {
      const y = dpDate.getFullYear();
      const m = dpDate.getMonth();
      document.getElementById('dpMonthYear').textContent = `${MONTHS[m]} ${y}`;

      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const today = new Date();
      const container = document.getElementById('dpDays');
      container.innerHTML = '';

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'dp-day empty';
        container.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'dp-day';
        el.textContent = d;
        const thisDate = new Date(y, m, d);
        if (today.toDateString() === thisDate.toDateString()) el.classList.add('today');
        if (dpSelected && dpSelected.toDateString() === thisDate.toDateString()) el.classList.add('selected');
        el.onclick = () => selectDay(y, m, d);
        container.appendChild(el);
      }
    }

    function selectDay(y, m, d) {
      dpSelected = new Date(y, m, d);
      dpDate = new Date(y, m, d);
      setHiddenDate(dpSelected);
      updateDisplay(dpSelected);
      renderCalendar();
      document.getElementById('datepickerDropdown').classList.remove('open');
    }

    function selectToday() {
      const today = new Date();
      selectDay(today.getFullYear(), today.getMonth(), today.getDate());
    }

    function clearDate() {
      dpSelected = null;
      document.getElementById('reportDate').value = '';
      document.getElementById('datepickerDisplay').textContent = 'Select date';
      document.getElementById('datepickerDisplay').style.color = 'var(--text3)';
      renderCalendar();
      document.getElementById('datepickerDropdown').classList.remove('open');
    }

    // Close picker when clicking outside
    document.addEventListener('click', (e) => {
      if (!document.getElementById('datepickerWrap').contains(e.target)) {
        document.getElementById('datepickerDropdown').classList.remove('open');
      }
    });

    function buildSectionRows() {
      const container = document.getElementById('sectionRows');
      SECTIONS.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'srow';
        row.innerHTML = `<span class="srow-key">${s.keyword}</span><input type="text" id="label_${i}" value="${s.label}" />`;
        container.appendChild(row);
      });
    }

    function getLabels() {
      const base = SECTIONS.map((s, i) => ({
        keyword: s.keyword.toLowerCase(),
        label: document.getElementById(`label_${i}`).value || `*${s.keyword.toUpperCase()}*`
      }));

      return base;
    }

    function extractProjectName(line) {
      let m = line.match(/^\d{1,2}:\d{2}\s*(?:AM|PM)\s+(.+?)\s+(?:\d+\.\d+\s+hours?\s+\()?(?:Feature|Feedback|Bug)\s+#/i);
      if (!m) m = line.match(/^\d{1,2}:\d{2}\s*(?:AM|PM)\s+(\w[\w\s&]+?)\s+(?:Documentation|Support|Research\s*&\s*Dev|QA|Task)\s+#/i);
      if (!m) return null;
      const raw = m[1].trim();

      // Case 1: "ProjectName (Online) : SubProject_vX" — has colon separator
      const colonM = raw.match(/^(.+?)\s+\([^)]+\)\s*:\s*(.+?)(?:_v[\d.]+[a-z]?)?$/i);
      if (colonM) {
        const base = colonM[1].replace(/\s+Web$/i, '').trim();
        const sub = colonM[2].trim();
        return `${base} - ${sub}`;
      }

      // Case 2: "ProjectName (EnvName)_vX" — env name is sub-project if not generic
      const parenM = raw.match(/^(.+?)\s+\(([^)]+)\)[_\w.]*$/i);
      if (parenM) {
        const base = parenM[1].replace(/\s+Web$/i, '').trim();
        const env = parenM[2].trim();
        if (/^(?:Online|Offline|Staging)$/i.test(env)) return base;
        const envLabel = env.replace(/Online-Retirement/i, 'Biz Retirement');
        return `${base} - ${envLabel}`;
      }

      // Fallback
      return raw
        .replace(/\s*\([^)]*\)[_\w.]*$/i, '')
        .replace(/\s+(?:Documentation|Support|Research\s*&\s*Dev|QA|Bug|Feature|Feedback|Task)$/i, '')
        .replace(/_[A-Za-z]+$/, '')
        .replace(/\s+Web$/i, '')
        .trim();
    }

    function isActivityLine(line) {
      // Valid activity lines start with a timestamp: "HH:MM AM/PM"
      return /^\d{1,2}:\d{2}\s*(?:AM|PM)\s+/i.test(line);
    }

    function parseActivity(raw) {
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const itemMap = {};  // key → item, for dedup + status update
      const itemOrder = []; // preserve first-seen order
      const issueRe = /(Feature|Feedback|Bug|Documentation|Support|Research\s*&\s*Dev|Task|QA)\s+#(\d+)(?:\s*\(([^)]+)\))?:\s*(.+)/i;

      for (const line of lines) {
        if (!isActivityLine(line)) continue;
        const m = line.match(issueRe);
        if (!m) continue;
        const type = m[1];
        const num = m[2];
        const statusRaw = (m[3] || '').trim();
        const isHourWrap = /\d+\.\d+\s+hours?\s+\(/i.test(line);
        const title = isHourWrap ? m[4].trim().replace(/\)$/, '') : m[4].trim();
        const key = `${type.toLowerCase()}#${num}`;
        const project = extractProjectName(line) || '__unknown__';

        if (!itemMap[key]) {
          // First time seeing this item
          itemMap[key] = { type, num, statusRaw, title, project };
          itemOrder.push(key);
        } else if (statusRaw) {
          // Already seen — update status if this occurrence has one (later log = more recent)
          itemMap[key].statusRaw = statusRaw;
        }
      }
      return itemOrder.map(k => itemMap[k]);
    }

    // Maps exact Redmine status tags → EOD section labels
    const STATUS_MAP = {
      'final qa':      '*FINAL QA*',
      'deploy request':'*DEPLOY REQUEST*',
      'new':           '*FILED FEEDBACK*',
      'qa process':    '*ON GOING QA*',
      'feedback':      '*FEEDBACK TO DEV*',
      'on queue':      '*ON QUEUE FOR QA*',
      'closed':        '*CLOSED*',
      'rejected':      '*REJECTED*',
      'on hold':       '*ON HOLD*',
      'qa request':    '*FEEDBACK TO DEV*',
    };

    function classifyStatus(statusRaw, labels) {
      const s = statusRaw.toLowerCase().trim();

      for (const [tag, section] of Object.entries(STATUS_MAP)) {
        if (s === tag || s.includes(tag)) {
          const match = labels.find(l => l.label === section);
          return match ? match.label : section;
        }
      }

      for (const l of labels) {
        if (s.includes(l.keyword)) return l.label;
      }

      // Unknown or no status — default to Feedback to Dev
      const feedbackLabel = labels.find(l => l.label === '*FEEDBACK TO DEV*');
      return feedbackLabel ? feedbackLabel.label : labels[0].label;
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return `${months[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;
    }

    function generate() {
      const raw = document.getElementById('input').value;
      const dateVal = document.getElementById('reportDate').value;
      const labels = getLabels();


      if (!raw.trim()) {
        document.getElementById('outputBlocks').innerHTML = '<span class="empty-state" style="font-style:italic; color:var(--text3); font-size:13px;">Walang input. I-paste muna ang Redmine activity text.</span>';
        return;
      }

      const allItems = parseActivity(raw);

      if (!allItems.length) {
        document.getElementById('outputBlocks').innerHTML = '<span class="empty-state" style="font-style:italic; color:var(--text3); font-size:13px;">Walang nahanap. Check mo kung tama ang na-copy na text.</span>';
        return;
      }

      // Group items by project, preserving first-seen order
      const projectOrder = [];
      const byProject = {};
      for (const item of allItems) {
        const p = item.project;
        if (!byProject[p]) {
          byProject[p] = {};
          projectOrder.push(p);
          for (const l of labels) byProject[p][l.label] = [];
        }
        const sec = classifyStatus(item.statusRaw, labels);
        if (!byProject[p][sec]) byProject[p][sec] = [];
        byProject[p][sec].push(item);
      }

      const sectionOrder = labels.map(l => l.label);
      const dateStr = dateVal ? formatDate(dateVal) : formatDate(new Date().toISOString().split('T')[0]);

      let total = 0;
      const blocks = [];

      for (const project of projectOrder) {
        const displayProject = project === '__unknown__' ? '(Unknown Project)' : project;
        let block = `QA Updates
As of ${dateStr}
${displayProject}

`;

        for (const sec of sectionOrder) {
          const secItems = byProject[project][sec] || [];
          if (secItems.length) {
            block += `${sec}\n`;
            for (const item of secItems) {
              block += `- ${item.type} #${item.num}: ${item.title}\n`;
              total++;
            }
            block += `\n`;
          }
        }
        blocks.push(block.trim());
      }

      const container = document.getElementById('outputBlocks');
      container.innerHTML = '';
      blocks.forEach((block, i) => {
        const card = document.createElement('div');
        card.className = 'project-block';
        const lines = block.split('\n');
        const firstLine = lines[0];
        const restText = lines.slice(1).join('\n');

        const toprow = document.createElement('div');
        toprow.className = 'project-block-toprow';

        const firstLineEl = document.createElement('span');
        firstLineEl.className = 'project-block-firstline';
        firstLineEl.textContent = firstLine;

        const copyBtn = document.createElement('button');
        copyBtn.className = 'project-block-copy';
        copyBtn.textContent = 'Copy';
        copyBtn.onclick = () => copyBlock(i);

        toprow.appendChild(firstLineEl);
        toprow.appendChild(copyBtn);

        const restEl = document.createElement('div');
        restEl.className = 'project-block-rest';
        restEl.id = `block_${i}`;
        restEl.textContent = restText;

        const contentEl = document.createElement('div');
        contentEl.className = 'project-block-content';
        contentEl.appendChild(toprow);
        contentEl.appendChild(restEl);
        card.appendChild(contentEl);
        container.appendChild(card);
      });
      document.getElementById('countBadge').textContent = `${total} item${total !== 1 ? 's' : ''}`;
      document.getElementById('reminder').style.display = blocks.length ? 'block' : 'none';
    }

    function copyBlock(i) {
      const restEl = document.getElementById(`block_${i}`);
      const firstLine = restEl.closest('.project-block-content').querySelector('.project-block-firstline').textContent;
      const text = firstLine + '\n' + restEl.textContent;
      if (!text) return;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }



    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); showToast(); } catch(e) {}
      document.body.removeChild(ta);
    }


    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('outputBlocks').innerHTML = '<span class="empty-state" style="font-style:italic; color:var(--text3); font-size:13px;">Output will appear here...</span>';
      document.getElementById('reminder').style.display = 'none';
      document.getElementById('countBadge').textContent = '0 items';
    }

    initDate();
    buildSectionRows();
  </script>
  <div class="toast" id="toast">Copied! 📋</div>
</body>
</html>
